<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Member — PulseGate</title>
  <meta name="description" content="Register a new gym member with facial biometrics in PulseGate.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo" aria-label="PulseGate home">
        <svg class="logo-icon" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="7" fill="currentColor" fill-opacity="0.12" />
          <polyline points="4,14 9,14 11,14 12.5,7 14,21 15.5,5 17,19 18.5,12 20,14 24,14" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        PulseGate
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="register.html" class="active">Register</a>
        <a href="access.html">Access</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <a href="index.html" class="back-link" id="back-home">
      <svg class="back-link-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="15" y1="10" x2="5" y2="10" />
        <polyline points="10,5 5,10 10,15" />
      </svg>
      <span>Back to home</span>
    </a>

    <div class="page-header">
      <h1>Register Member</h1>
      <p>Capture a face photo and set the membership details.</p>
    </div>

    <form id="register-form" class="form-card" novalidate>
      <div class="form-group">
        <label for="member-name" class="form-label">Full Name</label>
        <input type="text" id="member-name" class="form-input" placeholder="e.g. Alex Johnson" required
          autocomplete="name">
      </div>

      <div class="form-group">
        <label for="membership-expiry" class="form-label">Membership Expiry</label>
        <input type="date" id="membership-expiry" class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label">Member Photo</label>

        <!-- ===== Camera capture section ===== -->
        <div class="camera-section" id="camera-section">

          <!-- Idle state: choose camera or manual upload -->
          <div class="camera-placeholder" id="camera-placeholder">
            <svg class="camera-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
              <circle cx="12" cy="13" r="4" />
            </svg>
            <span class="camera-placeholder-text">Capture a live photo with your camera, or upload one from your
              device</span>
            <div class="camera-controls">
              <button type="button" id="open-camera-btn" class="btn btn-secondary">Open Camera</button>
              <button type="button" id="fallback-upload-btn" class="btn btn-outline">Upload Image Instead</button>
            </div>
            <span id="camera-error-note" class="camera-error-note" hidden></span>
          </div>

          <!-- Live preview state -->
          <div class="camera-preview-wrap" id="camera-preview-wrap" hidden>
            <div class="camera-video-frame">
              <video id="camera-video" class="camera-video" autoplay playsinline muted></video>
            </div>
            <div class="camera-controls">
              <button type="button" id="capture-btn" class="btn btn-primary">Capture Photo</button>
            </div>
          </div>

          <!-- Captured photo review state -->
          <div class="captured-preview-wrap" id="captured-preview-wrap" hidden>
            <div class="captured-image-frame">
              <img id="captured-image" class="captured-image" alt="Captured member photo preview">
            </div>
            <div class="camera-controls">
              <button type="button" id="retake-btn" class="btn btn-outline">Retake</button>
            </div>
          </div>

          <!-- Hidden canvas used only to grab a still frame from the video stream -->
          <canvas id="camera-canvas" class="camera-canvas"></canvas>

          <!-- Manual file upload — shown when the user picks "Upload Image Instead",
               or automatically if camera access is denied/unavailable -->
          <div class="file-upload" id="file-upload-fallback" hidden>
            <input type="file" id="member-image" class="file-upload-input" accept="image/*">
            <label for="member-image" class="file-upload-label">
              <!-- Camera icon -->
              <svg class="file-upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                <circle cx="12" cy="13" r="4" />
              </svg>
              <span class="file-upload-text"><strong>Choose a photo</strong> or drag it here</span>
              <span class="file-upload-hint">JPG, PNG — clear face shot recommended</span>
            </label>
            <span id="file-name" class="file-name" hidden></span>
            <img id="image-preview" class="image-preview" alt="Preview of selected photo" hidden>
            <button type="button" id="use-camera-btn" class="btn btn-outline camera-switch-btn">Use Camera
              Instead</button>
          </div>
        </div>
      </div>

      <button type="submit" id="register-btn" class="btn btn-primary">
        <span class="btn-text">Register Member</span>
      </button>

      <div id="result" class="result-card" role="alert" hidden></div>
    </form>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 PulseGate &mdash; Serverless biometric access control.</p>
  </footer>

  <script src="js/register.js"></script>
</body>

</html>
